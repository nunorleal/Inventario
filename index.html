<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Inventário NL</title>
  <meta name="application-name" content="Inventário NL" />
  <meta name="apple-mobile-web-app-title" content="Inventário NL" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root { color-scheme: light; }
    html { scroll-behavior: smooth; }
    body.modal-active { overflow: hidden; }
    .tab-active { color: #2563eb; }
    .tab-active .tab-line { transform: scaleX(1); }
    .safe-bottom { padding-bottom: max(6rem, env(safe-area-inset-bottom)); }
    .glass { background: rgba(255,255,255,.86); backdrop-filter: blur(14px); }
    .card-enter { animation: cardIn .18s ease-out both; }
    body.dark { background: #0f172a; color: #e2e8f0; color-scheme: dark; }
    body.dark .glass { background: rgba(15,23,42,.86); border-color: #1e293b; }
    body.dark .bg-white { background-color: #1e293b !important; }
    body.dark .bg-slate-50, body.dark .bg-slate-100 { background-color: #0f172a !important; }
    body.dark .bg-slate-200 { background-color: #334155 !important; }
    body.dark .text-slate-900, body.dark .text-slate-800, body.dark .text-slate-700 { color: #e2e8f0 !important; }
    body.dark .text-slate-600, body.dark .text-slate-500 { color: #cbd5e1 !important; }
    body.dark .text-slate-400 { color: #94a3b8 !important; }
    body.dark .border, body.dark .border-b, body.dark .border-t { border-color: #334155 !important; }
    body.dark input, body.dark textarea, body.dark select { background-color: #1e293b !important; color: #e2e8f0 !important; }
    body.dark input::placeholder, body.dark textarea::placeholder { color: #64748b !important; }
    body.dark .shadow-sm, body.dark .shadow-lg, body.dark .shadow-2xl { box-shadow: 0 18px 40px rgba(0,0,0,.28) !important; }
    .location-hero {
      border: 1px solid rgba(37, 99, 235, .42);
      box-shadow: 0 20px 45px rgba(37, 99, 235, .18);
    }
    .location-hero-bg {
      opacity: .48;
      filter: blur(2px) saturate(1.12);
      transform: scale(1.04);
    }
    .location-hero-overlay {
      background:
        linear-gradient(90deg, rgba(15,23,42,.90) 0%, rgba(30,64,175,.78) 52%, rgba(37,99,235,.54) 100%),
        radial-gradient(circle at 85% 20%, rgba(255,255,255,.30), transparent 34%);
    }
    .location-hero-title,
    .location-hero-desc,
    .location-hero-eyebrow { color: white !important; }
    .location-hero-eyebrow,
    .location-hero-desc { opacity: .82; }
    .location-hero-badge { background: rgba(255,255,255,.92) !important; color: #1d4ed8 !important; }
    body.dark .location-hero {
      border-color: rgba(59, 130, 246, .70) !important;
      box-shadow: 0 24px 70px rgba(37, 99, 235, .20) !important;
    }
    @keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    #printView { display: none; }
    @media print {
      header, nav, main, #modal, #locationDetailModal, #toast { display: none !important; }
      #printView { display: block !important; }
      body { background: white !important; color: #0f172a !important; padding-bottom: 0 !important; }
      .print-page { padding: 16px; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .print-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
      .print-meta { font-size: 12px; color: #64748b; margin-bottom: 18px; }
      .print-node { border-left: 2px solid #cbd5e1; margin-left: 10px; padding: 0 0 10px 14px; break-inside: avoid; }
      .print-node-title { font-size: 15px; font-weight: 800; margin-bottom: 3px; }
      .print-node-path { font-size: 10px; font-weight: 700; color: #2563eb; text-transform: uppercase; margin-bottom: 4px; }
      .print-node-desc { white-space: pre-wrap; font-size: 12px; color: #334155; margin-bottom: 8px; }
      .print-empty { font-size: 12px; color: #94a3b8; font-style: italic; }
      .print-break { break-inside: avoid; }
      .shadow-sm, .shadow-lg { box-shadow: none !important; }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen safe-bottom">

  <header class="glass border-b sticky top-0 z-30 px-4 py-3 shadow-sm">
    <div class="max-w-2xl mx-auto flex justify-between items-center gap-3">
      <div class="flex items-center gap-2 text-blue-700 font-bold text-lg min-w-0">
        <button id="appIconBtn" class="rounded-lg shrink-0 focus:outline-none focus:ring-2 focus:ring-blue-500" title="Alterar ícone da app" type="button">
          <img id="appIcon" src="inventario-icon.png" alt="" class="w-8 h-8 rounded-lg object-cover shadow-sm" />
        </button>
        <input id="appIconInput" type="file" class="hidden" accept="image/*" />
        <span class="truncate">Inventário NL</span>
      </div>
      <div class="flex gap-2 shrink-0">
        <button id="themeToggleBtn" class="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 transition text-slate-600" title="Alternar modo escuro" type="button">
          <i data-lucide="moon"></i>
        </button>
        <button id="printBtn" class="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 transition text-slate-600" title="Imprimir lista">
          <i data-lucide="printer"></i>
        </button>
        <button id="exportBtn" class="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 transition text-slate-600" title="Exportar backup">
          <i data-lucide="download"></i>
        </button>
        <label class="p-2 bg-slate-100 rounded-lg cursor-pointer hover:bg-slate-200 transition text-slate-600" title="Importar JSON">
          <i data-lucide="upload"></i>
          <input type="file" id="importInput" class="hidden" accept=".json,application/json" />
        </label>
      </div>
    </div>
    <div class="max-w-2xl mx-auto mt-2 flex justify-end">
      <div id="lastUpdateLine" class="text-[11px] font-semibold text-slate-400"></div>
    </div>
  </header>

  <main class="max-w-2xl mx-auto p-4">
    <section id="summary" class="grid grid-cols-3 gap-2 mb-4"></section>

    <div id="toolbar" class="space-y-3 mb-4">
      <div class="relative">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
        <input type="text" id="searchInput" placeholder="Pesquisar caixas, locais, conteúdos..." class="w-full pl-10 pr-10 py-3 rounded-xl border-0 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none" />
        <button id="clearSearch" class="hidden absolute right-2 top-1/2 -translate-y-1/2 p-2 text-slate-400 hover:text-slate-700" title="Limpar pesquisa">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <select id="locationFilter" class="p-3 bg-white rounded-xl border-0 shadow-sm ring-1 ring-slate-100 outline-none focus:ring-2 focus:ring-blue-500 text-sm">
          <option value="">Todos os locais</option>
        </select>
        <select id="sortSelect" class="p-3 bg-white rounded-xl border-0 shadow-sm ring-1 ring-slate-100 outline-none focus:ring-2 focus:ring-blue-500 text-sm">
          <option value="nameAsc">Ordenar: A-Z</option>
          <option value="nameDesc">Ordenar: Z-A</option>
          <option value="recent">Mais recentes primeiro</option>
          <option value="location">Por localização</option>
        </select>
      </div>
    </div>

    <section id="locationHeader" class="hidden mb-4"></section>
    <div id="breadcrumb" class="hidden mb-4 px-1"></div>

    <div class="flex justify-between items-center mb-4 px-1 gap-3">
      <span id="itemsCounter" class="text-xs font-semibold text-slate-500 uppercase tracking-wider">A carregar...</span>
      <div class="flex items-center gap-2 shrink-0">
        <button id="addInlineBtn" class="text-xs font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-2 rounded-lg flex items-center gap-1 transition">
          <i data-lucide="plus" class="w-3 h-3"></i> <span>Adicionar</span>
        </button>
        <button id="resetDataBtn" class="text-xs font-bold text-slate-400 hover:text-red-600 flex items-center gap-1">
          <i data-lucide="trash-2" class="w-3 h-3"></i> Apagar tudo
        </button>
      </div>
    </div>

    <div id="itemsContainer" class="space-y-4"></div>
    <div id="emptyState" class="hidden text-center py-14 text-slate-400">
      <i data-lucide="search-x" class="w-12 h-12 mx-auto mb-3"></i>
      <p class="font-bold">Não encontrei resultados.</p>
      <p class="text-sm">Experimenta mudar a pesquisa ou os filtros.</p>
    </div>
  </main>

  <section id="printView"></section>

  <nav class="fixed bottom-0 left-0 right-0 glass border-t p-2 flex justify-center items-center z-40 max-w-2xl mx-auto shadow-2xl rounded-t-2xl">
    <button id="tabLocations" class="flex-1 flex flex-col items-center py-2 transition tab-active relative">
      <i data-lucide="map-pin"></i>
      <span class="text-[10px] font-bold mt-1 uppercase">Locais</span>
      <span class="tab-line absolute bottom-0 w-8 h-0.5 rounded bg-blue-600 transition-transform origin-center"></span>
    </button>

    <button id="addBtn" class="bg-blue-600 text-white w-14 h-14 rounded-full flex items-center justify-center -mt-12 border-4 border-slate-50 shadow-lg active:scale-90 transition hover:bg-blue-700" title="Adicionar">
      <i data-lucide="plus" class="w-8 h-8"></i>
    </button>

    <button id="tabBoxes" class="flex-1 flex flex-col items-center py-2 transition text-slate-400 relative">
      <i data-lucide="package"></i>
      <span class="text-[10px] font-bold mt-1 uppercase">Conteúdos</span>
      <span class="tab-line absolute bottom-0 w-8 h-0.5 rounded bg-blue-600 transition-transform origin-center scale-x-0"></span>
    </button>
  </nav>

  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
    <div class="bg-white w-full max-w-md rounded-2xl overflow-hidden shadow-2xl flex flex-col max-h-[92vh]">
      <div class="p-4 border-b flex justify-between items-center bg-slate-50">
        <span id="modalTitle" class="font-bold text-slate-700">Novo registo</span>
        <button id="closeModal" class="p-2 hover:bg-slate-200 rounded-full text-slate-400" type="button"><i data-lucide="x"></i></button>
      </div>

      <form id="itemForm" class="p-5 space-y-4 overflow-y-auto">
        <input type="hidden" id="editId" />

        <div id="photoTrigger" class="w-full max-w-64 mx-auto aspect-square bg-slate-100 rounded-xl border-2 border-dashed border-slate-300 flex flex-col items-center justify-center cursor-pointer relative overflow-hidden group hover:border-blue-400 transition">
          <img id="photoPreview" alt="Pré-visualização" class="hidden w-full h-full object-cover" />
          <div id="photoPlaceholder" class="flex flex-col items-center">
            <i data-lucide="camera" class="text-slate-400 mb-1"></i>
            <span class="text-xs text-slate-500 font-medium">Adicionar foto</span>
          </div>
          <input id="photoInput" type="file" class="hidden" accept="image/*" capture="environment" />
        </div>
        <button id="removePhotoBtn" type="button" class="hidden -mt-2 text-xs font-bold text-red-500 hover:text-red-700">Remover fotografia</button>
        <button id="reusePhotoBtn" type="button" class="hidden -mt-2 w-full rounded-lg bg-blue-50 px-3 py-2 text-xs font-bold text-blue-600 hover:bg-blue-100 transition">
          Usar foto existente
        </button>

        <div id="photoLibraryPanel" class="hidden space-y-3 rounded-xl border bg-slate-50 p-3">
          <div class="flex items-center justify-between gap-3">
            <div class="text-[10px] font-bold text-slate-400 uppercase">Escolher foto já carregada</div>
            <button id="closePhotoLibraryBtn" type="button" class="text-xs font-bold text-slate-400 hover:text-slate-600">Fechar</button>
          </div>
          <div id="photoLibraryGrid" class="grid grid-cols-3 gap-2"></div>
        </div>

        <div id="photoCropControls" class="hidden space-y-3 rounded-xl border bg-slate-50 p-3">
          <div class="text-[10px] font-bold text-slate-400 uppercase">Ajustar fotografia ao quadrado</div>
          <div class="mx-auto aspect-square w-full max-w-64 overflow-hidden rounded-xl bg-slate-200 relative">
            <img id="cropImage" alt="Imagem para recortar" class="absolute left-1/2 top-1/2 max-w-none select-none pointer-events-none" />
          </div>
          <div class="space-y-2">
            <label class="block text-[10px] font-bold text-slate-400 uppercase">Zoom</label>
            <input id="cropZoom" type="range" min="1" max="3" step="0.01" value="1" class="w-full accent-blue-600" />
            <label class="block text-[10px] font-bold text-slate-400 uppercase">Horizontal</label>
            <input id="cropX" type="range" min="-100" max="100" step="1" value="0" class="w-full accent-blue-600" />
            <label class="block text-[10px] font-bold text-slate-400 uppercase">Vertical</label>
            <input id="cropY" type="range" min="-100" max="100" step="1" value="0" class="w-full accent-blue-600" />
          </div>
          <div class="grid grid-cols-2 gap-2">
            <button id="cancelCropBtn" type="button" class="rounded-lg bg-white px-3 py-2 text-sm font-bold text-slate-500 ring-1 ring-slate-200 hover:bg-slate-100">Cancelar</button>
            <button id="applyCropBtn" type="button" class="rounded-lg bg-blue-600 px-3 py-2 text-sm font-bold text-white hover:bg-blue-700">Aplicar quadrado</button>
          </div>
        </div>

        <div class="space-y-1">
          <label id="itemNameLabel" for="itemName" class="text-[10px] font-bold text-slate-400 uppercase ml-1">Nome</label>
          <input id="itemName" required autocomplete="off" class="w-full p-3 bg-slate-50 rounded-xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition" />
        </div>

        <div class="space-y-1">
          <label id="itemDescLabel" for="itemDesc" class="text-[10px] font-bold text-slate-400 uppercase ml-1">Conteúdo / Descrição</label>
          <textarea id="itemDesc" class="w-full p-3 bg-slate-50 rounded-xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 outline-none h-28 transition resize-none"></textarea>
        </div>

        <div id="locationSelectGroup" class="space-y-1">
          <label id="itemLocationLabel" for="itemLocation" class="text-[10px] font-bold text-slate-400 uppercase ml-1">Localização</label>
          <select id="itemLocation" class="w-full p-3 bg-slate-50 rounded-xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition bg-white">
            <option value="">Sem local definido</option>
          </select>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2 active:scale-95 transition mt-2">
          <i data-lucide="save" class="w-5 h-5"></i> <span>Guardar</span>
        </button>
      </form>
    </div>
  </div>

  <div id="locationDetailModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
    <div class="bg-white w-full max-w-md rounded-2xl overflow-hidden shadow-2xl flex flex-col max-h-[92vh]">
      <div class="p-4 border-b flex justify-between items-start gap-3 bg-slate-50">
        <div class="min-w-0">
          <span id="locationDetailTitle" class="font-bold text-slate-700 block break-words">Conteúdo do local</span>
          <div id="locationDetailUpdated" class="mt-1 text-[11px] font-bold uppercase text-slate-400"></div>
        </div>
        <button id="closeLocationDetail" class="p-2 hover:bg-slate-200 rounded-full text-slate-400" type="button"><i data-lucide="x"></i></button>
      </div>

      <div class="p-5 space-y-4 overflow-y-auto">
        <section>
          <div class="text-[10px] font-bold text-slate-400 uppercase mb-2">Conteúdo escrito diretamente</div>
          <div id="locationDetailContent" class="rounded-xl bg-slate-50 p-3 text-sm text-slate-600 whitespace-pre-wrap break-words"></div>
        </section>

        <section>
          <div class="flex items-center justify-between gap-3 mb-2">
            <div id="locationDetailBoxesTitle" class="text-[10px] font-bold text-slate-400 uppercase">Caixas neste local</div>
            <button id="locationDetailBoxesBtn" type="button" class="text-xs font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-2 rounded-lg flex items-center gap-1 transition">
              <i data-lucide="package" class="w-3 h-3"></i> Ver na lista
            </button>
          </div>
          <div id="locationDetailBoxes" class="space-y-2"></div>
        </section>
      </div>
    </div>
  </div>

  <div id="toast" class="fixed left-1/2 -translate-x-1/2 bottom-24 z-[60] hidden bg-slate-900 text-white text-sm font-semibold px-4 py-3 rounded-xl shadow-xl"></div>

        { id: '31', name: 'Caixa Cartão Eusébio - Roupa 5 NL', description: 'Interiores, Calçado velho, Sapatilhas bicicleta', parentId: 'loc1' },
        { id: '32', name: 'Caixa Cartão Eusébio - Escritório Secretária', description: 'Candeeiro, Beats, Blue Ray Apple', parentId: 'loc1' },
        { id: '33', name: 'Caixa Cartão 20Kg iTools - Escritório 2', description: 'Câmara Vídeo 8, Tinteiros Epson, Stickers Vretti', parentId: 'loc1' },
        { id: '34', name: 'Gaveta cama Sandra casa dos pais', description: 'Roupa Vinted, Calções praia, Luvas', parentId: 'loc3' }
      ].map((box, index) => ({ ...box, photo: null, createdAt: index + 10 }))
    };

    let appData = structuredClone(initialData);
    let currentPhoto = null;
    let currentFormType = 'box';
    let cropSource = null;
    let cropNaturalWidth = 1;
    let cropNaturalHeight = 1;
    let backupReminderTimer = null;
    let backupReminderShownFor = null;

    const $ = (id) => document.getElementById(id);
    const escapeHTML = (str = '') => String(str).replace(/[&<>'"]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[c]));
    const normalize = (str = '') => String(str).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

    async function init() {
      try {
        const saved = await loadSavedData();
        if (saved) appData = migrateData(saved);
      } catch { showToast('Não consegui ler os dados guardados. Usei a lista inicial.'); }

      appData.activeTab = 'locations';
      bindEvents();
      switchTab(appData.activeTab);
      lucide.createIcons();
    }

    async function loadSavedData() {
      const localRaw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem('inventory_html_final');
      const localData = localRaw ? JSON.parse(localRaw) : null;
      const indexedData = await readIndexedData();
      if (!indexedData) return localData;
      if (!localData) return indexedData;
      const localTime = new Date(localData.lastUpdatedAt || 0).getTime();
      const indexedTime = new Date(indexedData.lastUpdatedAt || 0).getTime();
      return indexedTime >= localTime ? indexedData : localData;
    }

    function migrateData(data) {
      const migrated = { ...structuredClone(initialData), ...data };
      migrated.appIcon = migrated.appIcon || null;
      migrated.darkMode = Boolean(migrated.darkMode);
      migrated.lastUpdatedAt = migrated.lastUpdatedAt || null;
      migrated.lastExportedAt = migrated.lastExportedAt || null;
      migrated.locations = (migrated.locations || []).map((item, idx) => ({ photo: null, parentId: '', description: '', createdAt: Date.now() + idx, updatedAt: null, ...item }));
      migrated.boxes = (migrated.boxes || []).map((item, idx) => ({ photo: null, parentId: '', description: '', createdAt: Date.now() + idx, updatedAt: null, ...item }));
      migrated.activeTab = migrated.activeTab === 'locations' ? 'locations' : 'boxes';
      return migrated;
    }

    function bindEvents() {
      $('tabBoxes').onclick = () => switchTab('boxes');
      $('tabLocations').onclick = () => switchTab('locations');
      $('appIconBtn').onclick = () => $('appIconInput').click();
      $('appIconInput').onchange = handleAppIcon;
      $('themeToggleBtn').onclick = toggleTheme;
      $('addBtn').onclick = () => openModal();
      $('addInlineBtn').onclick = () => openModal();
      $('closeModal').onclick = closeModal;
      $('modal').onmousedown = (e) => { if (e.target.id === 'modal') e.preventDefault(); };
      $('modal').onclick = () => {};
      $('closeLocationDetail').onclick = closeLocationDetail;
      $('locationDetailModal').onclick = (e) => { if (e.target.id === 'locationDetailModal') closeLocationDetail(); };
      $('itemForm').onsubmit = handleSave;
      $('searchInput').oninput = render;
      $('clearSearch').onclick = () => { $('searchInput').value = ''; render(); $('searchInput').focus(); };
      $('locationFilter').onchange = render;
      $('sortSelect').onchange = render;
      $('exportBtn').onclick = exportJSON;
      $('importInput').onchange = importJSON;
      $('printBtn').onclick = printInventory;
      $('resetDataBtn').onclick = resetData;
      $('removePhotoBtn').onclick = () => { currentPhoto = null; cropSource = null; hideCropControls(); hidePhotoLibrary(); updatePhotoPreview(); };
      $('reusePhotoBtn').onclick = togglePhotoLibrary;
      $('closePhotoLibraryBtn').onclick = hidePhotoLibrary;
      $('photoTrigger').onclick = () => $('photoInput').click();
      $('photoInput').onchange = handlePhoto;
      $('cropZoom').oninput = updateCropPreview;
      $('cropX').oninput = updateCropPreview;
      $('cropY').oninput = updateCropPreview;
      $('applyCropBtn').onclick = applySquareCrop;
      $('cancelCropBtn').onclick = () => { hideCropControls(); $('photoInput').value = ''; };
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeModal(); closeLocationDetail(); } });
    }

    function switchTab(tab) {
      appData.activeTab = tab;
      $('locationFilter').value = '';
      $('searchInput').value = '';
      $('tabBoxes').className = `flex-1 flex flex-col items-center py-2 transition relative ${tab === 'boxes' ? 'tab-active' : 'text-slate-400'}`;
      $('tabLocations').className = `flex-1 flex flex-col items-center py-2 transition relative ${tab === 'locations' ? 'tab-active' : 'text-slate-400'}`;
      $('tabBoxes').querySelector('.tab-line').classList.toggle('scale-x-0', tab !== 'boxes');
      $('tabLocations').querySelector('.tab-line').classList.toggle('scale-x-0', tab !== 'locations');
      render();
    }

    function render() {
      renderTheme();
      renderAppIcon();
      renderLastUpdate();
      renderSummary();
      renderLocationFilter();
      renderLocationHeader();
      renderBreadcrumb();
      renderList();
      lucide.createIcons();
    }

    function renderLastUpdate() {
      if (!appData.lastUpdatedAt) {
        $('lastUpdateLine').textContent = 'Sem alterações registadas';
        $('lastUpdateLine').className = 'text-[11px] font-semibold text-slate-400';
        scheduleBackupReminder();
        return;
      }
      const needsExport = !appData.lastExportedAt || new Date(appData.lastExportedAt) < new Date(appData.lastUpdatedAt);
      $('lastUpdateLine').textContent = `Último update: ${formatDateTime(appData.lastUpdatedAt)}${needsExport ? ' · backup recomendado' : ''}`;
      $('lastUpdateLine').className = `text-[11px] font-semibold ${needsExport ? 'text-amber-600' : 'text-slate-400'}`;
      scheduleBackupReminder();
    }

    function formatDateTime(value) {
      return new Intl.DateTimeFormat('pt-PT', {
        day: 'numeric',
        month: 'long',
        hour: '2-digit',
        minute: '2-digit'
      }).format(new Date(value));
    }

    function markUpdated() {
      appData.lastUpdatedAt = new Date().toISOString();
      backupReminderShownFor = null;
    }

    function scheduleBackupReminder() {
      clearTimeout(backupReminderTimer);
      if (!appData.lastUpdatedAt) return;
      if (appData.lastExportedAt && new Date(appData.lastExportedAt) >= new Date(appData.lastUpdatedAt)) return;
      if (backupReminderShownFor === appData.lastUpdatedAt) return;
      const elapsed = Date.now() - new Date(appData.lastUpdatedAt).getTime();
      const wait = Math.max(0, 5 * 60 * 1000 - elapsed);
      backupReminderTimer = setTimeout(() => {
        backupReminderShownFor = appData.lastUpdatedAt;
        showToast('Alterações por exportar. Faz um backup JSON.');
        renderLastUpdate();
      }, wait);
    }

    function renderTheme() {
      document.body.classList.toggle('dark', Boolean(appData.darkMode));
      $('themeToggleBtn').innerHTML = `<i data-lucide="${appData.darkMode ? 'sun' : 'moon'}"></i>`;
      $('themeToggleBtn').title = appData.darkMode ? 'Alternar modo claro' : 'Alternar modo escuro';
    }

    async function toggleTheme() {
      const previousData = structuredClone(appData);
      appData.darkMode = !appData.darkMode;
      markUpdated();
      if (!(await saveData(false))) {
        appData = previousData;
      }
      render();
    }

    function renderAppIcon() {
      const icon = appData.appIcon || 'inventario-icon.png';
      $('appIcon').src = icon;
      updateIconLink('icon', icon);
      updateIconLink('apple-touch-icon', icon);
    }

    function updateIconLink(rel, href) {
      const link = document.querySelector(`link[rel="${rel}"]`);
      if (link) link.href = href;
    }

    async function saveData(silent = false) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
        return true;
      } catch {
        try {
          await writeIndexedData(appData);
          try { localStorage.removeItem(STORAGE_KEY); } catch {}
          if (!silent) showToast('Dados guardados em armazenamento alargado.');
          return true;
        } catch {
          if (!silent) {
            alert('Não consegui guardar os dados no browser. Exporta um backup e tenta remover algumas fotografias para libertar espaço.');
          }
          return false;
        }
      }
    }

    function openInventoryDb() {
      return new Promise((resolve, reject) => {
        if (!('indexedDB' in window)) {
          reject(new Error('IndexedDB indisponível'));
          return;
        }
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = () => {
          request.result.createObjectStore(DB_STORE);
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function readIndexedData() {
      try {
        const db = await openInventoryDb();
        return await new Promise((resolve, reject) => {
          const tx = db.transaction(DB_STORE, 'readonly');
          const request = tx.objectStore(DB_STORE).get(DB_KEY);
          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => reject(request.error);
          tx.oncomplete = () => db.close();
        });
      } catch {
        return null;
      }
    }

    async function writeIndexedData(data) {
      const db = await openInventoryDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(DB_STORE, 'readwrite');
        tx.objectStore(DB_STORE).put(structuredClone(data), DB_KEY);
        tx.oncomplete = () => { db.close(); resolve(true); };
        tx.onerror = () => { db.close(); reject(tx.error); };
        tx.onabort = () => { db.close(); reject(tx.error); };
      });
    }

    function handleAppIcon(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => cropImageToSquare(reader.result, 1, 0, 0, 180, 0.72).then(async data => {
        const previousIcon = appData.appIcon;
        const previousUpdatedAt = appData.lastUpdatedAt;
        appData.appIcon = data;
        markUpdated();
        if (!(await saveData(false))) {
          appData.appIcon = previousIcon;
          appData.lastUpdatedAt = previousUpdatedAt;
          return;
        }
        render();
        showToast('Ícone da app atualizado.');
      });
      reader.readAsDataURL(file);
      e.target.value = '';
    }

    function renderSummary() {
      const contents = appData.boxes.length + appData.locations.filter(item => item.parentId).length;
      const locations = appData.locations.length;
      const photos = [...appData.boxes, ...appData.locations].filter(i => i.photo).length;
      $('summary').innerHTML =
        statCard('map-pin', locations, 'Locais', 'locations') +
        statCard('package', contents, 'Conteúdos', 'boxes') +

    function statCard(icon, value, label, targetTab = null) {
      const isActive = targetTab && appData.activeTab === targetTab;
      const action = targetTab ? `onclick="switchTab('${targetTab}')"` : '';
      const interactiveClass = targetTab ? 'cursor-pointer hover:border-blue-300 hover:shadow-md active:scale-[.98]' : '';

        <i data-lucide="${icon}" class="w-5 h-5 mx-auto text-blue-600 mb-1"></i>
        <div class="font-black text-lg">${value}</div>
        <div class="text-[10px] font-bold uppercase text-slate-400">${label}</div>
      </div>`;
    }

    function renderLocationFilter() {
      const selected = $('locationFilter').value;
      $('locationFilter').disabled = appData.activeTab !== 'boxes';
      $('locationFilter').classList.toggle('opacity-50', appData.activeTab !== 'boxes');
      $('locationFilter').innerHTML = '<option value="">Todos os locais</option>' + appData.locations
        .slice().sort((a,b) => a.name.localeCompare(b.name, 'pt'))
        .map(l => `<option value="${escapeHTML(l.id)}">${escapeHTML(l.name)}</option>`).join('') + '<option value="__none">Sem local definido</option>';
      $('locationFilter').value = selected;
    }

    function renderBreadcrumb() {
      const search = $('searchInput').value.trim();
      const locationId = $('locationFilter').value;
      const shouldShow = appData.activeTab === 'boxes' && !search;
      $('breadcrumb').classList.toggle('hidden', !shouldShow);
      if (!shouldShow) return;

      const path = locationId && locationId !== '__none' ? getLocationPath(locationId) : [];
      const rootLabel = locationId === '__none' ? 'Sem local definido' : 'Todos os conteúdos';
      const parts = [
        `<button onclick="goToContentRoot()" class="inline-flex items-center gap-1 text-xs font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-2 rounded-lg transition"><i data-lucide="home" class="w-3 h-3"></i>${rootLabel}</button>`
      ];

      if (locationId && locationId !== '__none') {
        parts[0] = `<button onclick="goToContentRoot()" class="inline-flex items-center gap-1 text-xs font-bold text-slate-500 hover:text-blue-600 px-2 py-2 rounded-lg transition"><i data-lucide="home" class="w-3 h-3"></i>Conteúdos</button>`;
        path.forEach((location, index) => {
          const isLast = index === path.length - 1;
          parts.push('<i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>');
          parts.push(`<button onclick="goToLocation('${location.id}')" class="text-xs font-bold ${isLast ? 'text-blue-700 bg-blue-50' : 'text-slate-500 hover:text-blue-600'} px-3 py-2 rounded-lg transition">${escapeHTML(location.name)}</button>`);
        });
      }

      $('breadcrumb').innerHTML = `<div class="flex items-center gap-1 overflow-x-auto whitespace-nowrap">${parts.join('')}</div>`;
    }

    function renderLocationHeader() {
      const search = $('searchInput').value.trim();
      const locationId = $('locationFilter').value;
      const location = appData.activeTab === 'boxes' && !search && locationId && locationId !== '__none'
        ? appData.locations.find(l => l.id === locationId)
        : null;
      $('locationHeader').classList.toggle('hidden', !location);
      if (!location) return;

      const childCount = appData.boxes.filter(item => item.parentId === location.id).length + appData.locations.filter(item => item.parentId === location.id).length;
      const background = location.photo
        ? `<div class="location-hero-bg absolute inset-0 bg-cover bg-center" style="background-image: url('${location.photo}')"></div><div class="location-hero-overlay absolute inset-0"></div>`
        : '<div class="absolute inset-0 bg-gradient-to-br from-slate-900 via-blue-900 to-blue-600"></div><div class="absolute inset-0 bg-[radial-gradient(circle_at_85%_18%,rgba(255,255,255,.30),transparent_34%)]"></div>';
      $('locationHeader').innerHTML = `<div onclick="openLocationDetail('${location.id}')" class="location-hero relative rounded-xl overflow-hidden flex cursor-pointer hover:border-blue-300 transition">
        ${background}
        <button onclick="event.stopPropagation(); editItem('${location.id}', 'location')" class="absolute right-3 top-3 z-20 rounded-lg bg-white/90 p-2 text-blue-700 shadow-sm hover:bg-white active:scale-95 transition" title="Editar este local" type="button">
          <i data-lucide="edit-2" class="w-4 h-4"></i>
        </button>
        <div class="relative z-10 w-28 h-28 sm:w-40 sm:h-40 bg-slate-200 flex-shrink-0">
          ${location.photo ? `<img src="${location.photo}" alt="${escapeHTML(location.name)}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-slate-300"><i data-lucide="map-pin" class="w-10 h-10"></i></div>`}
        </div>
        <div class="relative z-10 p-3 sm:p-4 flex-1 min-w-0">
          <div class="location-hero-eyebrow text-[10px] font-black uppercase tracking-wider mb-1">Dentro de</div>
          <h2 class="location-hero-title font-black text-xl sm:text-2xl break-words">${escapeHTML(location.name)}</h2>
          ${location.description ? `<p class="location-hero-desc text-sm mt-1 whitespace-pre-wrap break-words">${escapeHTML(formatPreviewText(location.description))}</p>` : '<p class="location-hero-desc text-sm italic mt-1">Sem descrição neste local.</p>'}
          <div class="location-hero-badge mt-3 inline-flex items-center gap-1 rounded-lg px-2.5 py-1.5 text-[11px] font-black shadow-sm">
            <i data-lucide="package" class="w-3 h-3"></i>${childCount} conteúdo${childCount === 1 ? '' : 's'}
          </div>
        </div>
      </div>`;
    }

    function getLocationPath(locationId) {
      const path = [];
      const seen = new Set();
      let current = appData.locations.find(l => l.id === locationId);
      while (current && !seen.has(current.id)) {
        seen.add(current.id);
        path.unshift(current);
        current = appData.locations.find(l => l.id === current.parentId);
      }
      return path;
    }

    function getDescendantLocationIds(locationId) {
      const descendants = new Set();
      const visit = (parentId) => {
        appData.locations
          .filter(location => location.parentId === parentId)
          .forEach(location => {
            if (descendants.has(location.id)) return;
            descendants.add(location.id);
            visit(location.id);
          });
      };
      visit(locationId);
      return descendants;
    }

    function goToContentRoot() {
      switchTab('boxes');
      $('locationFilter').value = '';
      render();
    }

    function goToLocation(locationId) {
      switchTab('boxes');
      $('locationFilter').value = locationId;
      render();
    }

    function printInventory() {
      renderPrintView();
      window.print();
    }

    function renderPrintView() {
      const printedAt = new Intl.DateTimeFormat('pt-PT', {
        day: 'numeric',
        month: 'long',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      }).format(new Date());
      const rootLocations = appData.locations
        .filter(location => !location.parentId)
        .sort((a,b) => a.name.localeCompare(b.name, 'pt'));
      const looseBoxes = appData.boxes
        .filter(box => !box.parentId)
        .sort((a,b) => a.name.localeCompare(b.name, 'pt'));

      $('printView').innerHTML = `<div class="print-page">
        <div class="print-title">Inventário NL</div>
        <div class="print-meta">Relatório completo gerado em ${escapeHTML(printedAt)}</div>
      ${rootLocations.map(location => renderPrintLocation(location, [], new Set())).join('')}
        ${looseBoxes.length ? `<div class="print-node">
          <div class="print-node-path">Sem local definido</div>
          ${looseBoxes.map(box => renderPrintBox(box, ['Sem local definido'])).join('')}
        </div>` : ''}
      </div>`;
    }

    function renderPrintLocation(location, ancestors, seen = new Set()) {
      if (seen.has(location.id)) {
        return `<div class="print-node">
          <div class="print-node-path">${escapeHTML([...ancestors, location.name].join(' > '))}</div>
          <div class="print-empty">Hierarquia circular detectada neste local.</div>
        </div>`;
      }
      const nextSeen = new Set(seen);
      nextSeen.add(location.id);
      const path = [...ancestors, location.name];
      const childLocations = appData.locations
        .filter(item => item.parentId === location.id)
        .sort((a,b) => a.name.localeCompare(b.name, 'pt'));
      const childBoxes = appData.boxes
        .filter(item => item.parentId === location.id)
        .sort((a,b) => a.name.localeCompare(b.name, 'pt'));

      return `<div class="print-node">
        <div class="print-node-path">${escapeHTML(path.join(' > '))}</div>
        <div class="print-node-title">${escapeHTML(location.name)}</div>
        ${location.description ? `<div class="print-node-desc">${escapeHTML(location.description)}</div>` : ''}
        ${childLocations.map(child => renderPrintLocation(child, path, nextSeen)).join('')}
        ${childBoxes.map(box => renderPrintBox(box, path)).join('')}
        ${!childLocations.length && !childBoxes.length && !location.description ? '<div class="print-empty">Sem conteúdos registados.</div>' : ''}
      </div>`;
    }

    function renderPrintBox(box, ancestors) {
      return `<div class="print-node">
        <div class="print-node-path">${escapeHTML(ancestors.join(' > '))}</div>
        <div class="print-node-title">${escapeHTML(box.name)}</div>
        ${box.description ? `<div class="print-node-desc">${escapeHTML(box.description)}</div>` : '<div class="print-empty">Sem descrição.</div>'}
      </div>`;
    }

    function getFilteredList() {
      const search = normalize($('searchInput').value.trim());
      const locationFilter = $('locationFilter').value;
      const sort = $('sortSelect').value;
      let list = search
        ? [
            ...appData.locations.map(item => ({ type: 'location', item })),
            ...appData.boxes.map(item => ({ type: 'box', item }))
          ]
        : appData.activeTab === 'boxes'
        ? [
            ...appData.boxes.map(item => ({ type: 'box', item })),
            ...appData.locations.filter(item => item.parentId).map(item => ({ type: 'location', item }))
          ]
        : appData.locations.map(item => ({ type: 'location', item }));

      if (!search && appData.activeTab === 'boxes' && locationFilter) {
        list = list.filter(entry => locationFilter === '__none' ? !entry.item.parentId : entry.item.parentId === locationFilter);
      }

      if (search) {
        list = list.filter(entry => {
          const loc = appData.locations.find(l => l.id === entry.item.parentId);
          return normalize(`${entry.item.name} ${entry.item.description} ${loc ? loc.name : ''}`).includes(search);
        });
      }

      list.sort((a,b) => {
        if (sort === 'nameDesc') return b.item.name.localeCompare(a.item.name, 'pt');
        if (sort === 'recent') return getItemSortTime(b.item) - getItemSortTime(a.item);
        if (sort === 'location') {
          const la = appData.locations.find(l => l.id === a.item.parentId)?.name || '';
          const lb = appData.locations.find(l => l.id === b.item.parentId)?.name || '';
          return la.localeCompare(lb, 'pt') || a.item.name.localeCompare(b.item.name, 'pt');
        }
        return a.item.name.localeCompare(b.item.name, 'pt');
      });

      return list;
    }

    function getItemSortTime(item) {
      const updated = item.updatedAt ? new Date(item.updatedAt).getTime() : 0;
      const created = item.createdAt ? new Date(item.createdAt).getTime() : 0;
      return updated || created || 0;
    }

    function renderList() {
      const filtered = getFilteredList();
      const isSearching = Boolean($('searchInput').value.trim());
      const total = isSearching
        ? appData.boxes.length + appData.locations.length
        : appData.activeTab === 'boxes'
        ? appData.boxes.length + appData.locations.filter(item => item.parentId).length
        : appData.locations.length;
      const selectedLocationId = $('locationFilter').value;
      const isInsideLocation = appData.activeTab === 'boxes' && selectedLocationId && selectedLocationId !== '__none';
      $('clearSearch').classList.toggle('hidden', !$('searchInput').value);
      $('itemsCounter').innerText = `${filtered.length} de ${total} ${isSearching ? 'resultados' : (appData.activeTab === 'boxes' ? 'conteúdos' : 'locais')}`;
      $('addInlineBtn').querySelector('span').innerText = appData.activeTab === 'boxes'
        ? (isInsideLocation ? 'Adicionar item aqui' : 'Adicionar item')
        : 'Adicionar local';
      $('emptyState').classList.toggle('hidden', filtered.length > 0);
      $('itemsContainer').innerHTML = filtered.map(entry => renderCard(entry.item, entry.type)).join('');
    }

    function renderCard(item, type) {
      const isBox = type === 'box';
      const isLocation = type === 'location';
      const location = appData.locations.find(l => l.id === item.parentId);
      const childCount = isBox ? 0 : appData.boxes.filter(b => b.parentId === item.id).length + appData.locations.filter(l => l.parentId === item.id).length;
      const description = escapeHTML(formatPreviewText(item.description || ''));
      const updatedLabel = formatItemUpdatedAt(item);
      const locationContents = description
        ? `<div class="mt-2 rounded-lg bg-slate-50 px-3 py-2 text-sm text-slate-600">
            <div class="text-[10px] font-bold uppercase text-slate-400 mb-1">Conteúdo neste local</div>
            <p class="whitespace-pre-wrap break-words">${description}</p>
          </div>`
        : `<p class="text-slate-400 text-sm mt-1 italic">Sem conteúdo descrito diretamente neste local.</p>`;
      return `<article onclick="${isLocation ? `showBoxesInLocation('${item.id}')` : `openItemPreview('${item.id}')`}" class="card-enter print-break bg-white rounded-xl shadow-sm border flex overflow-hidden cursor-pointer hover:border-blue-200 hover:shadow-md transition">
        <div class="w-28 h-28 sm:w-40 sm:h-40 bg-slate-200 flex-shrink-0">
          ${item.photo ? `<img src="${item.photo}" alt="${escapeHTML(item.name)}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-slate-300"><i data-lucide="${isBox ? 'package' : 'map-pin'}" class="w-10 h-10"></i></div>`}
        </div>
        <div class="p-3 sm:p-4 flex-1 min-w-0">
          <div class="flex justify-between items-start gap-3">
            <div class="flex-1 min-w-0">
              <h3 class="font-bold text-slate-800 break-words">${escapeHTML(item.name)}</h3>
              ${updatedLabel ? `<div class="mt-0.5 text-[10px] font-bold uppercase text-slate-400 inline-flex items-center gap-1"><i data-lucide="clock-3" class="w-3 h-3"></i>${escapeHTML(updatedLabel)}</div>` : ''}
              ${isBox ? `<p class="text-slate-500 text-sm mt-1 whitespace-pre-wrap break-words">${description}</p>` : locationContents}
              <div class="mt-3 flex flex-wrap gap-2">
                ${isBox ? `<span class="text-[11px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded inline-flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i>${escapeHTML(location ? location.name : 'Local indefinido')}</span>` : `<span class="text-[11px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded inline-flex items-center gap-1"><i data-lucide="package" class="w-3 h-3"></i>${childCount} conteúdo${childCount === 1 ? '' : 's'}</span>`}
                ${isLocation && location ? `<span class="text-[11px] font-bold text-slate-600 bg-slate-100 px-2 py-1 rounded inline-flex items-center gap-1"><i data-lucide="corner-down-right" class="w-3 h-3"></i>${escapeHTML(location.name)}</span>` : ''}
                ${!isBox && item.description ? `<span class="text-[11px] font-bold text-emerald-700 bg-emerald-50 px-2 py-1 rounded inline-flex items-center gap-1"><i data-lucide="list" class="w-3 h-3"></i>conteúdo próprio</span>` : ''}
              </div>
            </div>
            <div class="flex gap-1 shrink-0">
              <button onclick="event.stopPropagation(); duplicateItem('${item.id}', '${type}')" class="text-slate-400 hover:text-emerald-600 p-2" title="Duplicar"><i data-lucide="copy" class="w-4 h-4"></i></button>
              <button onclick="event.stopPropagation(); editItem('${item.id}', '${type}')" class="text-slate-400 hover:text-blue-500 p-2" title="Editar"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
              <button onclick="event.stopPropagation(); deleteItem('${item.id}', '${type}')" class="text-slate-400 hover:text-red-500 p-2" title="Apagar"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
          </div>
        </div>
      </article>`;
    }

    function formatPreviewText(text) {
      const lines = String(text)
        .split(/\n|,/)
        .map(line => line.trim())
        .filter(Boolean);
      if (lines.length <= 3) return lines.join('\n');
      return `${lines[0]}\n${lines[1]}\n${lines[2]}...`;
    }

    function formatItemUpdatedAt(item) {
      const createdAt = Number(item.createdAt);
      const rawDate = item.updatedAt || (createdAt > 1000000000000 ? createdAt : null);
      if (!rawDate) return '';
      const date = new Date(rawDate);
      if (Number.isNaN(date.getTime())) return '';
      return `Última atualização: ${new Intl.DateTimeFormat('pt-PT', {
        weekday: 'short',
        day: 'numeric',
        month: 'short',
        hour: '2-digit',
        minute: '2-digit'
      }).format(date)}`;
    }

    function renderDetailUpdated(item) {
      const label = formatItemUpdatedAt(item);
      $('locationDetailUpdated').textContent = label || 'Sem data de atualização registada';
    }

    function openItemPreview(itemId) {
      const item = appData.boxes.find(box => box.id === itemId);
      if (!item) return;
      const location = appData.locations.find(l => l.id === item.parentId);
      $('locationDetailTitle').innerText = item.name;
      renderDetailUpdated(item);
      $('locationDetailContent').innerHTML = item.description
        ? escapeHTML(item.description)
        : '<span class="text-slate-400 italic">Sem conteúdo descrito.</span>';
      $('locationDetailBoxesTitle').innerText = 'Localização';
      $('locationDetailBoxesBtn').classList.add('hidden');
      $('locationDetailBoxes').innerHTML = `<div class="rounded-xl bg-blue-50 p-3 text-sm font-bold text-blue-700 inline-flex items-center gap-2">
        <i data-lucide="map-pin" class="w-4 h-4"></i>${escapeHTML(location ? location.name : 'Local indefinido')}
      </div>`;
      $('locationDetailModal').classList.remove('hidden');
      $('locationDetailModal').classList.add('flex');
      document.body.classList.add('modal-active');
      lucide.createIcons();
    }

    function openLocationDetail(locationId) {
      const location = appData.locations.find(l => l.id === locationId);
      if (!location) return;
      const boxes = appData.boxes.filter(b => b.parentId === locationId).sort((a,b) => a.name.localeCompare(b.name, 'pt'));
      const locations = appData.locations.filter(l => l.parentId === locationId).sort((a,b) => a.name.localeCompare(b.name, 'pt'));
      const contents = [
        ...locations.map(item => ({ type: 'location', item })),
        ...boxes.map(item => ({ type: 'box', item }))
      ].sort((a,b) => a.item.name.localeCompare(b.item.name, 'pt'));
      $('locationDetailTitle').innerText = location.name;
      renderDetailUpdated(location);
      $('locationDetailContent').innerHTML = location.description
        ? escapeHTML(location.description)
        : '<span class="text-slate-400 italic">Sem conteúdo descrito diretamente neste local.</span>';
      $('locationDetailBoxesTitle').innerText = `${contents.length} conteúdo${contents.length === 1 ? '' : 's'} neste local`;
      $('locationDetailBoxesBtn').classList.toggle('hidden', contents.length === 0);
      $('locationDetailBoxesBtn').onclick = () => showBoxesInLocation(locationId);
      $('locationDetailBoxes').innerHTML = contents.length ? contents.map(entry => `
        <div class="rounded-xl border bg-white p-3">
          <div class="text-[10px] font-bold uppercase text-slate-400 mb-1">${entry.type === 'location' ? 'Local' : 'Item'}</div>
          <div class="font-bold text-sm text-slate-800">${escapeHTML(entry.item.name)}</div>
          <div class="text-sm text-slate-500 mt-1 whitespace-pre-wrap break-words">${escapeHTML(entry.item.description || '')}</div>
        </div>
      `).join('') : '<div class="rounded-xl bg-slate-50 p-3 text-sm text-slate-400 italic">Não há conteúdos associados a este local.</div>';
      $('locationDetailModal').classList.remove('hidden');
      $('locationDetailModal').classList.add('flex');
      document.body.classList.add('modal-active');
      lucide.createIcons();
    }

    function closeLocationDetail() {
      $('locationDetailModal').classList.add('hidden');
      $('locationDetailModal').classList.remove('flex');
      if ($('modal').classList.contains('hidden')) document.body.classList.remove('modal-active');
    }

    function showBoxesInLocation(locationId) {
      closeLocationDetail();
      switchTab('boxes');
      $('locationFilter').value = locationId;
      render();
    }

    function openModal(editingItem = null, type = null) {
      currentFormType = type || (appData.activeTab === 'boxes' ? 'box' : 'location');
      const isBoxForm = currentFormType === 'box';
      const selectedLocation = appData.locations.find(l => l.id === $('locationFilter').value);
      $('itemForm').reset();
      $('editId').value = editingItem ? editingItem.id : '';
      currentPhoto = editingItem ? editingItem.photo : null;
      cropSource = null;
      hideCropControls();
      hidePhotoLibrary();
      updatePhotoPreview();
      renderPhotoLibrary();
      const blockedLocationIds = editingItem && currentFormType === 'location'
        ? getDescendantLocationIds(editingItem.id)
        : new Set();
      const locationOptions = appData.locations
        .filter(l => !editingItem || (l.id !== editingItem.id && !blockedLocationIds.has(l.id)))
        .map(l => `<option value="${escapeHTML(l.id)}">${escapeHTML(l.name)}</option>`)
        .join('');
      $('itemLocation').innerHTML = `<option value="">${isBoxForm ? 'Sem local definido' : 'Local principal'}</option>` + locationOptions;
      $('modalTitle').innerText = editingItem ? 'Editar registo' : (isBoxForm ? (selectedLocation ? `Novo item em ${selectedLocation.name}` : 'Novo item') : 'Novo local');
      $('itemNameLabel').innerText = isBoxForm ? 'Nome do item' : 'Nome do local';
      $('itemDescLabel').innerText = isBoxForm ? 'Conteúdo / Descrição do item' : 'Conteúdo guardado diretamente neste local';
      $('itemLocationLabel').innerText = isBoxForm ? 'Localização' : 'Dentro de';
      $('itemName').placeholder = isBoxForm ? 'Ex.: Caixa cabos USB, saco, pasta, objeto...' : 'Ex.: Cofre';
      $('itemDesc').placeholder = isBoxForm
        ? 'Ex.: cabos USB-C, adaptadores, carregadores...'
        : 'Ex.: passaportes, relógios, documentos, chaves...';

      if (editingItem) {
        $('itemName').value = editingItem.name || '';
        $('itemDesc').value = editingItem.description || '';
        $('itemLocation').value = editingItem.parentId || '';
      } else if ($('locationFilter').value && $('locationFilter').value !== '__none') {
        $('itemLocation').value = $('locationFilter').value;
      }

      $('locationSelectGroup').style.display = 'block';
      $('modal').classList.remove('hidden');
      $('modal').classList.add('flex');
      document.body.classList.add('modal-active');
      setTimeout(() => $('itemName').focus(), 100);
      lucide.createIcons();
    }

    function closeModal() {
      $('modal').classList.add('hidden');
      $('modal').classList.remove('flex');
      document.body.classList.remove('modal-active');
      $('photoInput').value = '';
      hidePhotoLibrary();
    }

    function updatePhotoPreview() {
      $('removePhotoBtn').classList.toggle('hidden', !currentPhoto);
      if (currentPhoto) {
        $('photoPreview').src = currentPhoto;
        $('photoPreview').classList.remove('hidden');
        $('photoPlaceholder').classList.add('hidden');
      } else {
        $('photoPreview').removeAttribute('src');
        $('photoPreview').classList.add('hidden');
        $('photoPlaceholder').classList.remove('hidden');
      }
    }

    function getPhotoLibrary() {
      const seen = new Set();
      return [
        ...appData.locations.map(item => ({ item, type: 'Local' })),
        ...appData.boxes.map(item => ({ item, type: 'Conteúdo' }))
      ]
        .filter(entry => entry.item.photo)
        .filter(entry => {
          if (seen.has(entry.item.photo)) return false;
          seen.add(entry.item.photo);
          return true;
        })
        .sort((a,b) => a.item.name.localeCompare(b.item.name, 'pt'));
    }

    function renderPhotoLibrary() {
      const photos = getPhotoLibrary();
      $('reusePhotoBtn').classList.toggle('hidden', photos.length === 0);
      $('photoLibraryGrid').innerHTML = photos.map((entry, index) => `
        <button type="button" onclick="selectExistingPhoto(${index})" class="group overflow-hidden rounded-lg bg-white text-left ring-1 ring-slate-200 hover:ring-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
          <img src="${entry.item.photo}" alt="${escapeHTML(entry.item.name)}" class="aspect-square w-full object-cover" />
          <div class="p-2">
            <div class="truncate text-[10px] font-black uppercase text-slate-400">${entry.type}</div>
            <div class="truncate text-xs font-bold text-slate-700">${escapeHTML(entry.item.name)}</div>
          </div>
        </button>
      `).join('');
    }

    function togglePhotoLibrary() {
      hideCropControls();
      renderPhotoLibrary();
      $('photoLibraryPanel').classList.toggle('hidden');
    }

    function hidePhotoLibrary() {
      $('photoLibraryPanel').classList.add('hidden');
    }

    function selectExistingPhoto(index) {
      const photo = getPhotoLibrary()[index];
      if (!photo) return;
      currentPhoto = photo.item.photo;
      cropSource = null;
      hideCropControls();
      hidePhotoLibrary();
      updatePhotoPreview();
      showToast('Fotografia existente aplicada.');
    }

    function handlePhoto(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => openCropControls(reader.result);
      reader.readAsDataURL(file);
    }

    function openCropControls(dataUrl) {
      cropSource = dataUrl;
      $('cropZoom').value = 1;
      $('cropX').value = 0;
      $('cropY').value = 0;
      $('cropImage').src = dataUrl;
      $('photoCropControls').classList.remove('hidden');
      const img = new Image();
      img.onload = () => {
        cropNaturalWidth = img.naturalWidth || img.width;
        cropNaturalHeight = img.naturalHeight || img.height;
        updateCropPreview();
      };
      img.src = dataUrl;
    }

    function hideCropControls() {
      $('photoCropControls').classList.add('hidden');
    }

    function updateCropPreview() {
      if (!cropSource) return;
      const zoom = Number($('cropZoom').value);
      const x = Number($('cropX').value);
      const y = Number($('cropY').value);
      const isWide = cropNaturalWidth >= cropNaturalHeight;
      $('cropImage').style.width = isWide ? `${100 * zoom}%` : 'auto';
      $('cropImage').style.height = isWide ? 'auto' : `${100 * zoom}%`;
      $('cropImage').style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
    }

    function applySquareCrop() {
      if (!cropSource) return;
      cropImageToSquare(cropSource, Number($('cropZoom').value), Number($('cropX').value), Number($('cropY').value), 420, 0.58).then(data => {
        currentPhoto = data;
        hideCropControls();
        updatePhotoPreview();
        $('photoInput').value = '';
        showToast('Fotografia ajustada e comprimida.');
      });
    }

    function cropImageToSquare(dataUrl, zoom, offsetX, offsetY, size, quality) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          const baseScale = Math.max(size / img.width, size / img.height);
          const scale = baseScale * zoom;
          const drawWidth = img.width * scale;
          const drawHeight = img.height * scale;
          const drawX = (size - drawWidth) / 2 + offsetX * 2;
          const drawY = (size - drawHeight) / 2 + offsetY * 2;
          ctx.fillStyle = '#e2e8f0';
          ctx.fillRect(0, 0, size, size);
          ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);
          resolve(getSmallImageDataUrl(canvas, quality));
        };
        img.src = dataUrl;
      });
    }

    function getSmallImageDataUrl(canvas, quality) {
      const webp = canvas.toDataURL('image/webp', quality);
      if (webp.startsWith('data:image/webp')) return webp;
      return canvas.toDataURL('image/jpeg', quality);
    }

    async function handleSave(e) {
      e.preventDefault();
      const id = $('editId').value;
      const collection = currentFormType === 'location' ? 'locations' : 'boxes';
      const previousData = structuredClone(appData);
      const item = {
        id: id || crypto.randomUUID(),
        name: $('itemName').value.trim(),
        description: $('itemDesc').value.trim(),
        photo: currentPhoto,
        parentId: $('itemLocation').value,
        createdAt: id ? (appData[collection].find(i => i.id === id)?.createdAt || Date.now()) : Date.now(),
        updatedAt: new Date().toISOString()
      };

      if (!item.name) {
        alert('Escreve um nome antes de guardar.');
        return;
      }

      if (currentFormType === 'location' && id) {
        const descendants = getDescendantLocationIds(id);
        if (item.parentId === id || descendants.has(item.parentId)) {
          alert('Este local não pode ficar dentro de si próprio nem dentro de um local que já está dentro dele.');
          return;
        }
      }

      if (id) appData[collection] = appData[collection].map(i => i.id === id ? { ...i, ...item } : i);
      else appData[collection].unshift(item);
      markUpdated();

      if (!(await saveData(false))) {
        appData = previousData;
        return;
      }

      closeModal();
      render();
      showToast(id ? 'Registo atualizado.' : 'Registo criado.');
    }

    function editItem(id, type = null) {
      const itemType = type || (appData.locations.some(i => i.id === id) ? 'location' : 'box');
      const collection = itemType === 'location' ? appData.locations : appData.boxes;
      openModal(collection.find(i => i.id === id), itemType);
    }

    async function duplicateItem(id, type = null) {
      const itemType = type || (appData.locations.some(i => i.id === id) ? 'location' : 'box');
      const collectionName = itemType === 'location' ? 'locations' : 'boxes';
      const original = appData[collectionName].find(i => i.id === id);
      if (!original) return;
      const previousData = structuredClone(appData);
      appData[collectionName].unshift({ ...original, id: crypto.randomUUID(), name: `${original.name} — cópia`, createdAt: Date.now(), updatedAt: new Date().toISOString() });
      markUpdated();
      if (!(await saveData(false))) {
        appData = previousData;
        render();
        return;
      }
      render();
      showToast('Registo duplicado.');
    }

    async function deleteItem(id, type = null) {
      const itemType = type || (appData.locations.some(i => i.id === id) ? 'location' : 'box');
      const collectionName = itemType === 'location' ? 'locations' : 'boxes';
      const item = appData[collectionName].find(i => i.id === id);
      if (!item) return;
      const isLocation = itemType === 'location';
      const boxesInside = isLocation ? appData.boxes.filter(b => b.parentId === id).length : 0;
      const locationsInside = isLocation ? appData.locations.filter(l => l.parentId === id).length : 0;
      const totalInside = boxesInside + locationsInside;
      const msg = totalInside ? `Apagar o local "${item.name}"? Os ${totalInside} conteúdos associados NÃO serão apagados; ficam apenas sem local definido.` : `Apagar "${item.name}"?`;
      if (!confirm(msg)) return;
      const previousData = structuredClone(appData);
      appData[collectionName] = appData[collectionName].filter(i => i.id !== id);
      if (isLocation) {
        appData.boxes = appData.boxes.map(b => b.parentId === id ? { ...b, parentId: '' } : b);
        appData.locations = appData.locations.map(l => l.parentId === id ? { ...l, parentId: '' } : l);
      }
      markUpdated();
      if (!(await saveData(false))) {
        appData = previousData;
        render();
        return;
      }
      render();
      showToast('Registo apagado.');
    }

    async function exportJSON() {
      appData.lastExportedAt = new Date().toISOString();
      await saveData(true);
      const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const dl = document.createElement('a');
      const date = new Date();
      const stamp = [
        date.getFullYear(),
        String(date.getMonth() + 1).padStart(2, '0'),
        String(date.getDate()).padStart(2, '0')
      ].join('-') + '_' + [
        String(date.getHours()).padStart(2, '0'),
        String(date.getMinutes()).padStart(2, '0')
      ].join('-');
      dl.href = url;
      dl.download = `Inventario_NL_${stamp}.json`;
      dl.click();
      URL.revokeObjectURL(url);
      render();
      showToast('Backup exportado.');
    }

    function importJSON(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (event) => {
        const previousData = structuredClone(appData);
        try {
          const data = migrateData(JSON.parse(event.target.result));
          if (!Array.isArray(data.boxes) || !Array.isArray(data.locations)) throw new Error();
          appData = data;
          markUpdated();
          if (!(await saveData(false))) {
            appData = previousData;
            render();
            return;
          }
          render();
          showToast('Backup importado.');
        } catch { alert('Erro no ficheiro. Confirma se é um backup JSON válido.'); }
      };
      reader.readAsText(file);
      e.target.value = '';
    }

    async function resetData() {
      const total = appData.boxes.length + appData.locations.length;
      if (!confirm(`Apagar todos os ${total} registos? Esta ação remove locais, conteúdos e fotos guardadas. Exporta um backup antes se precisares.`)) return;
      const typed = prompt('Para confirmar, escreve APAGAR TUDO em maiúsculas.');
      if (typed !== 'APAGAR TUDO') {
        showToast('Operação cancelada.');
        return;
      }
      const previousData = structuredClone(appData);
      appData = { activeTab: 'locations', appIcon: null, darkMode: false, lastUpdatedAt: new Date().toISOString(), lastExportedAt: null, locations: [], boxes: [] };
      $('searchInput').value = '';
      $('locationFilter').value = '';
      if (!(await saveData(false))) {
        appData = previousData;
        render();
        return;
      }
      render();
      showToast('Inventário apagado.');
    }

    let toastTimer;
    function showToast(message) {
      clearTimeout(toastTimer);
      $('toast').textContent = message;
      $('toast').classList.remove('hidden');
      toastTimer = setTimeout(() => $('toast').classList.add('hidden'), 2200);
    }

    window.onload = init;
  </script>
</body>
</html>
